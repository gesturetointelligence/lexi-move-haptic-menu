name: Register Move

on:
  push:
    branches: [main]
    paths:
      - 'lexi-play.json'

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate lexi-play.json
        run: |
          node -e "
            const m = require('./lexi-play.json');
            const required = ['name','slug','description','date','authors','medium','status'];
            const missing = required.filter(f => !m[f]);
            if (missing.length) { console.error('Missing fields:', missing); process.exit(1); }
            console.log('Valid:', m.name);
          "

      - name: Upsert to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          MANIFEST=$(cat lexi-play.json)
          REPO_URL="https://github.com/${{ github.repository }}"
          README_URL="https://github.com/${{ github.repository }}#readme"

          SLUG=$(echo "$MANIFEST" | node -e "process.stdin.on('data',d=>{console.log(JSON.parse(d).slug)})")

          PAYLOAD=$(node -e "
            const m = JSON.parse(process.argv[1]);
            console.log(JSON.stringify({
              slug: m.slug,
              name: m.name,
              description: m.description,
              date: m.date,
              authors: m.authors,
              medium: m.medium,
              tags: m.tags || [],
              demo_url: m.demo_url || '',
              repo_url: process.argv[2],
              readme_url: process.argv[3],
              status: m.status || 'active',
              updated_at: new Date().toISOString()
            }));
          " "$MANIFEST" "$REPO_URL" "$README_URL")

          curl -sf -X POST "${SUPABASE_URL}/rest/v1/moves" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "$PAYLOAD"
